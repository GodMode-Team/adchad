# pnpm 10+ reads build-script approvals here (not package.json). esbuild's binary backs tsx;
# sharp is a transitive Next dep. Without this, fresh installs (e.g. the VPS) fail the build-approval gate.
onlyBuiltDependencies:
  - esbuild
  - sharp

# Skip the pre-`run` deps check so `pnpm tool ...` never triggers an install (and its build-approval
# gate) at runtime. pnpm 11 dropped this key from .npmrc, so it must live here; the .npmrc line is kept
# for pnpm 10. Without this, the skills' `pnpm -s tool ...` calls break on a fresh pnpm-11 box.
verifyDepsBeforeRun: false
